global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "node-exporter"
    static_configs:
      - targets: ["starter-node-exporter:9100"]

  - job_name: "postgres-exporter"
    static_configs:
      - targets: ["starter-postgres-exporter:9187"]
  
  - job_name: "redis-exporter"
    static_configs:
      - targets: ["starter-redis-exporter:9121"]

  - job_name: "go-gin-app"
    static_configs:
      - targets: ["starter-api:8080"]