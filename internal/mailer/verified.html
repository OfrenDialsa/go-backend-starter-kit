<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Email Verified</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#f8fafc;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

.card{
  max-width:600px;
  width:100%;
  background:white;
  border-radius:12px;
  padding:32px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h1{
  margin-top:0;
}

p{
  color:#555;
}

.btn{
  display:inline-block;
  margin-top:16px;
  padding:12px 20px;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

.btn-primary{
  background:#2563eb;
  color:white;
}

.btn-secondary{
  border:1px solid #ddd;
  color:#333;
}

.footer{
  margin-top:20px;
  font-size:12px;
  color:#777;
}
</style>
</head>

<body>

<div class="card">

<h1 id="title">Email verified 🎉</h1>

<p id="subtitle">
Your email has been successfully verified.
</p>

<p id="panel">
You can now continue to the application.
</p>

<div>
<a id="openApp" class="btn btn-primary" href="#">Open Application</a>
<button id="copyLinkBtn" class="btn btn-secondary">Copy Link</button>
</div>

<p class="footer">
Starter template by <strong>Ofren Dialsa</strong>
</p>

</div>

<script>

const APP_URL = "/";
const AUTO_REDIRECT_SECONDS = 3;

(function(){

const params = new URLSearchParams(location.search);
const status = (params.get("status") || "success").toLowerCase();

const title = document.getElementById("title");
const subtitle = document.getElementById("subtitle");
const panel = document.getElementById("panel");
const openApp = document.getElementById("openApp");

openApp.href = APP_URL;

switch(status){

case "already":
title.textContent = "Email already verified";
subtitle.textContent = "Your email was already verified earlier.";
panel.textContent = "You can continue to the application.";
break;

case "expired":
title.textContent = "Verification link expired";
subtitle.textContent = "Your verification link has expired.";
panel.textContent = "Please request a new verification email.";
break;

case "invalid":
title.textContent = "Invalid verification link";
subtitle.textContent = "The verification link is invalid.";
panel.textContent = "Please request a new verification email.";
break;

default:

if(AUTO_REDIRECT_SECONDS > 0){

let s = AUTO_REDIRECT_SECONDS;

const tick = () => {

panel.textContent = `Redirecting to the application in ${s} second${s==1?"":"s"}...`;

if(s-- <= 0){
location.assign(APP_URL);
}else{
setTimeout(tick,1000);
}

};

setTimeout(tick,800);

}

}

document.getElementById("copyLinkBtn").addEventListener("click", async (e) => {

try{

await navigator.clipboard.writeText(APP_URL);

const btn = e.currentTarget;
const old = btn.textContent;

btn.textContent = "Copied!";

setTimeout(()=>btn.textContent = old,1200);

}catch{

alert("Failed to copy link: " + APP_URL);

}

});

})();

</script>

</body>
</html>
