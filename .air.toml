root = "."
testdata_dir = "testdata"
tmp_dir = "docker/air/tmp"

[build]
  cmd = "go build -o ./docker/air/tmp/main -buildvcs=false ."
  full_bin = "./docker/air/tmp/main"
  
  include_ext = ["go", "tpl", "tmpl", "html", "env", "yaml", "toml"]
  exclude_dir = ["assets", "tmp", "vendor", "test", "docs", "docker"] 
  
  delay = 1000 
  stop_on_error = true
  clean_on_exit = true

[log]
  time = true
  main_only = false

[screen]
  clear_on_rebuild = true